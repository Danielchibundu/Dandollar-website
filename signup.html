<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
</head>

<body style="font-family: Arial, sans-serif; background-color: #e0e0e0; padding: 20px; text-align: center;">
    <h2 style="text-align: center; background-color: #f0f0f0; padding: 10px;">Sign Up</h2>
    <form>
        <label for="name">First Name:</label>
        <input type="text" placeholder="Enter your first name" id="name" name="name" required>
        <br><br>
        <label for="lastname">LastName:</label>
        <input type="text" placeholder="Enter your last name" id="lastname" name="lastname" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" placeholder="Enter your email" id="email" name="email" required>
        <br><br>
        <label for="password">Password:</label>
        <input type="password" placeholder="Enter your password" id="password" name="password" required>
        <br><br>
        <label for="confirm-password">Confirm Password:</label>
        <input type="password" placeholder="Confirm your password" id="confirm-password" name="confirm-password" required>
        <br><br>
        <label for="date">Date of Birth:</label>
        <input type="date" id="date" name="date-time" required>
        <br><br>
        <label for="time">Preferred Time for Services:</label>
        <input type="time" id="time" name="date-time" required>
        <br><br>
        <label for="gender">Gender:</label>
        <label>
            <input type="radio" id="male" name="gender" value="male" required>
            Male
        </label>
        <label>
            <input type="radio" id="female" name="gender" value="female" required>
            Female
        </label>
        <label>
            <input type="radio" id="other" name="gender" value="other" required>
            Other
        </label>
        <label>
            <input type="radio" id="prefer-not-to-say" name="gender" value="prefer-not-to-say" required>
            Prefer not to say
        </label>
        <br><br>
        <a href="terms.html">Accept terms and Conditions</a>
        <input type="checkbox" id="terms" name="terms" required>
        <label for="reset">Clear all fields</label>
        <input type="reset" id="reset" name="reset">
        <br><br>
        <button type="submit">Create Account</button>
        <br><br>
        <label for="login">Already have an account?</label>
        <a href="login.html">Login</a>
        <label for="remember-me">Remember me</label>
        <input type="checkbox" id="remember-me" name="remember-me">
    </form>
    <a href="index.html">Back to Home</a>
</body>

</html>
